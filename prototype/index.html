<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Haven House — Transitional Housing Management System. Manage referrals, beds, chores, and resident intake." />
  <title>Haven House — Transitional Housing Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Side Navigation (Staff) ===== -->
  <nav id="sidebar" class="sidebar hidden" aria-label="Staff Navigation">
    <div class="sidebar-brand">
      <span class="brand-icon">🏠</span>
      <h1 class="brand-name">Haven House</h1>
    </div>
    <ul class="nav-links">
      <li><a href="#/dashboard" data-view="dashboard" class="nav-link active"><span class="nav-icon">📊</span> Dashboard</a></li>
      <li><a href="#/referrals" data-view="referrals" class="nav-link"><span class="nav-icon">📋</span> Referrals</a></li>
      <li><a href="#/beds" data-view="beds" class="nav-link"><span class="nav-icon">🛏️</span> Bed Board</a></li>
      <li><a href="#/residents" data-view="residents" class="nav-link"><span class="nav-icon">👥</span> Residents</a></li>
      <li><a href="#/chores" data-view="chores" class="nav-link"><span class="nav-icon">🧹</span> Chores</a></li>
      <li><a href="#/checklist" data-view="checklist" class="nav-link"><span class="nav-icon">✅</span> HM Checklist</a></li>
      <li><a href="#/settings" data-view="settings" class="nav-link"><span class="nav-icon">⚙️</span> Settings</a></li>
    </ul>
    <div class="sidebar-footer">
      <button id="btn-logout" class="btn btn-outline btn-sm">Sign Out</button>
    </div>
  </nav>

  <!-- ===== Mobile Bottom Nav (Staff) ===== -->
  <nav id="mobile-nav" class="mobile-nav hidden" aria-label="Mobile Staff Navigation">
    <a href="#/dashboard" data-view="dashboard" class="mob-link active"><span>📊</span><small>Home</small></a>
    <a href="#/referrals" data-view="referrals" class="mob-link"><span>📋</span><small>Referrals</small></a>
    <a href="#/beds" data-view="beds" class="mob-link"><span>🛏️</span><small>Beds</small></a>
    <a href="#/chores" data-view="chores" class="mob-link"><span>🧹</span><small>Chores</small></a>
    <a href="#/checklist" data-view="checklist" class="mob-link"><span>✅</span><small>Checklist</small></a>
  </nav>

  <!-- ===== Main Content Area ===== -->
  <main id="app-content" class="app-content">
    <!-- Views are rendered here dynamically -->
  </main>

  <!-- ===== Modal Overlay ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container" role="dialog" aria-modal="true">
      <button id="modal-close" class="modal-close" aria-label="Close modal">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ===== Toast Notifications ===== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ===== Scripts (ES Modules) ===== -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
